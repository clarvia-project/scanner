# Auto-deploy pipeline for Clarvia releases.
#
# Trigger: push a tag matching v* (e.g. v1.2.0)
#
# Steps:
#   1. Run backend + MCP server tests
#   2. Build artifacts and verify
#   3. Create GitHub release with auto-generated changelog
#   4. Trigger Render deploy webhook (backend)
#   5. (Prep) npm publish — manual trigger only, for safety
#   6. (Prep) PyPI publish — manual trigger only, for safety
#
# Rollback:
#   - Render: revert to previous deploy via Render dashboard > Deploys > Manual Deploy
#   - npm:    `npm unpublish clarvia-mcp-server@<version>` within 72h, or publish a patch
#   - GitHub: delete the release and tag, then push a revert commit

name: Auto Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish to npm (yes/no)"
        required: false
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"
      publish_pypi:
        description: "Publish to PyPI (yes/no)"
        required: false
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"

permissions:
  contents: write  # needed for creating releases

jobs:
  # -------------------------------------------------------------------------
  # 1. Test
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt && pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        working-directory: backend
        env:
          SCANNER_SUPABASE_URL: ""
          SCANNER_SUPABASE_ANON_KEY: ""
          SCANNER_STRIPE_SECRET_KEY: ""
        run: pytest tests/ -v -x -k "not test_scan_valid_url"

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build MCP server
        working-directory: mcp-server
        run: npm run build

      - name: Verify MCP build output
        working-directory: mcp-server
        run: |
          test -f dist/index.js || (echo "Missing dist/index.js" && exit 1)

  # -------------------------------------------------------------------------
  # 2. Build & Verify
  # -------------------------------------------------------------------------
  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify version consistency
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "Tag version: $TAG_VERSION"

          # Check mcp-server/package.json version if it exists
          if [ -f mcp-server/package.json ]; then
            PKG_VERSION=$(python3 -c "import json; print(json.load(open('mcp-server/package.json'))['version'])")
            echo "Package version: $PKG_VERSION"
          fi

      - name: Build artifacts summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: Python/FastAPI on Render" >> $GITHUB_STEP_SUMMARY
          echo "- MCP Server: npm package" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------------
  # 3. Create GitHub Release
  # -------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const changelog = `${{ steps.changelog.outputs.changelog }}`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Clarvia ${tag}`,
              body: changelog,
              draft: false,
              prerelease: tag.includes('-'),
            });

  # -------------------------------------------------------------------------
  # 4. Trigger Render Deploy
  # -------------------------------------------------------------------------
  deploy-render:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Trigger Render deploy
        # Render auto-deploys on push, but this ensures deploy happens
        # even if auto-deploy is temporarily disabled.
        # Set RENDER_DEPLOY_HOOK_URL in repository secrets.
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Render deploy hook failed (non-fatal)"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping (Render auto-deploy should handle this)"
          fi

  # -------------------------------------------------------------------------
  # 5. npm Publish (manual trigger only)
  # -------------------------------------------------------------------------
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish_npm == 'yes'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        working-directory: mcp-server
        run: npm ci && npm run build

      - name: Publish to npm
        working-directory: mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # -------------------------------------------------------------------------
  # 6. PyPI Publish (manual trigger only — future use)
  # -------------------------------------------------------------------------
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish_pypi == 'yes'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distribution
        working-directory: cli
        run: |
          pip install build twine
          python -m build

      - name: Publish to PyPI
        working-directory: cli
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*
