name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Backend: lint + test
  # -------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/ --select E,F,W --ignore E501

      - name: Run tests
        env:
          SCANNER_SUPABASE_URL: ""
          SCANNER_SUPABASE_ANON_KEY: ""
          SCANNER_STRIPE_SECRET_KEY: ""
        run: pytest tests/ -v -x -k "not test_scan_valid_url"

  # -------------------------------------------------------------------------
  # MCP Server: build
  # -------------------------------------------------------------------------
  mcp-server:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "Missing dist/index.js" && exit 1)
          head -1 dist/index.js | grep -q "#!/usr/bin/env node" || (echo "Missing shebang" && exit 1)

  # -------------------------------------------------------------------------
  # Frontend: build
  # -------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.clarvia.art
