name: 'Clarvia AEO Scan'
description: 'Scan your API/tool for AI agent compatibility using Clarvia'
branding:
  icon: 'shield'
  color: 'purple'
inputs:
  url:
    description: 'URL to scan'
    required: true
  fail-under:
    description: 'Minimum score threshold (0-100). Fails the step if score is below.'
    required: false
    default: '0'
  format:
    description: 'Output format: text, json, sarif'
    required: false
    default: 'text'
outputs:
  score:
    description: 'Clarvia score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  rating:
    description: 'Rating (Strong/Moderate/Basic/Low)'
    value: ${{ steps.scan.outputs.rating }}
  scan-id:
    description: 'Scan ID for reference'
    value: ${{ steps.scan.outputs.scan_id }}
runs:
  using: 'composite'
  steps:
    - name: Run Clarvia Scan
      id: scan
      shell: bash
      run: |
        RESPONSE=$(curl -s -X POST "https://clarvia-api.onrender.com/api/scan" \
          -H "Content-Type: application/json" \
          -d "{\"url\": \"${{ inputs.url }}\"}" \
          --max-time 120)

        SCORE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('clarvia_score', 0))")
        RATING=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('rating', 'unknown'))")
        SCAN_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('scan_id', ''))")

        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "rating=$RATING" >> $GITHUB_OUTPUT
        echo "scan_id=$SCAN_ID" >> $GITHUB_OUTPUT

        echo "## Clarvia AEO Score: $SCORE/100 ($RATING)" >> $GITHUB_STEP_SUMMARY

        if [ "${{ inputs.format }}" = "json" ]; then
          echo "$RESPONSE" | python3 -m json.tool
        elif [ "${{ inputs.format }}" = "sarif" ]; then
          echo "$RESPONSE" | python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        sarif = {
          '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json',
          'version': '2.1.0',
          'runs': [{'tool': {'driver': {'name': 'Clarvia', 'version': '2.0'}}, 'results': []}]
        }
        print(json.dumps(sarif, indent=2))
        "
        else
          echo "Score: $SCORE/100 ($RATING)"
          echo "Scan ID: $SCAN_ID"
        fi

        THRESHOLD=${{ inputs.fail-under }}
        if [ "$THRESHOLD" -gt 0 ] && [ "$SCORE" -lt "$THRESHOLD" ]; then
          echo "::error::Clarvia score $SCORE is below threshold $THRESHOLD"
          exit 1
        fi
