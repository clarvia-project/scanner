# Clarvia Automation Configuration
# Manages all recurring automation tasks for the platform.
#
# Schedule format: standard cron (min hour dom month dow)
# Timeout: seconds before the task is killed
# Enabled: set false to disable without removing

orchestrator:
  log_file: data/automation.log
  telegram_on_failure: true

tasks:
  healthcheck:
    script: scripts/healthcheck.py
    schedule: "*/5 * * * *"  # every 5 min
    enabled: true
    timeout: 60

  error_monitor:
    script: scripts/error_monitor.py
    schedule: "*/5 * * * *"
    enabled: true
    timeout: 60

  backup:
    script: scripts/backup.py
    schedule: "0 3 * * *"  # 3am daily
    enabled: true
    timeout: 300

  harvester:
    script: scripts/automation/harvester.py
    schedule: "0 6 * * *"  # 6am daily
    enabled: true
    timeout: 600

  classifier:
    script: scripts/automation/classifier.py
    schedule: "30 6 * * *"  # 6:30am daily (after harvester)
    enabled: true
    timeout: 300

  dead_link_check:
    script: scripts/automation/dead_link_cleaner.py
    schedule: "0 4 * * 0"  # Sunday 4am
    enabled: true
    timeout: 1800

  daily_report:
    script: scripts/automation/daily_report.py
    schedule: "0 22 * * *"  # 10pm daily
    enabled: true
    timeout: 120

  weekly_report:
    script: scripts/automation/score_reporter.py
    schedule: "0 10 * * 1"  # Monday 10am
    enabled: true
    timeout: 300

  self_improvement:
    script: scripts/automation/self_improver.py
    schedule: "0 12 * * 0"  # Sunday noon
    enabled: true
    timeout: 300

  integration_verify:
    script: scripts/automation/integration_verifier.py
    schedule: "0 8 * * *"  # 8am daily
    enabled: true
    timeout: 300

  onboarding:
    script: scripts/automation/onboarding.py
    schedule: "*/30 * * * *"  # every 30 min
    enabled: true
    timeout: 180

  feedback_engine:
    script: scripts/automation/feedback_engine.py
    schedule: "0 2 * * *"  # 2am daily
    enabled: true
    timeout: 300

  dashboard:
    script: scripts/automation/dashboard_generator.py
    schedule: "0 * * * *"  # hourly
    enabled: true
    timeout: 120

  schema_watchdog:
    script: scripts/automation/schema_watchdog.py
    schedule: "0 5 * * *"  # 5am daily
    enabled: true
    timeout: 300

  curator:
    script: scripts/automation/curator.py
    schedule: "30 7 * * *"  # 7:30am daily (after classifier at 6:30am)
    enabled: true
    timeout: 300

  data_auditor:
    script: scripts/automation/data_auditor.py
    args: ["--fix"]
    schedule: "0 7 * * *"  # 7am daily (after harvester at 6am)
    enabled: true
    timeout: 300

  self_healer:
    script: scripts/automation/self_healer.py
    schedule: "0 */6 * * *"  # every 6 hours
    enabled: true
    timeout: 600

  auto_merge:
    script: scripts/automation/auto_merge_and_deploy.py
    schedule: "0 8 * * *"  # 8am daily (after harvester 6am + classifier 6:30am + auditor 7am)
    enabled: true
    timeout: 300

  # ---------------------------------------------------------------------------
  # MARKETING AUTOMATION — Agent-only distribution, no human social media
  # ---------------------------------------------------------------------------
  marketing_automation:
    script: scripts/automation/marketing_automation.py
    schedule: "0 9 * * *"  # 9am daily — after auto_merge, reports on distribution health
    enabled: true
    timeout: 180
    description: "Check MCP registry listings, npm version, awesome-list PR status, llms.txt, API health"

  # ---------------------------------------------------------------------------
  # SITEMAP REFRESH — Rebuild sitemap when catalog grows significantly
  # ---------------------------------------------------------------------------
  sitemap_refresh:
    script: scripts/automation/sitemap_refresh.py
    schedule: "0 10 * * 1"  # Monday 10am — weekly refresh
    enabled: true
    timeout: 300
    description: "Rebuild XML sitemaps from current catalog and ping Google/Bing"

  # ---------------------------------------------------------------------------
  # SCORE CALIBRATION — Recalibrate scoring distribution periodically
  # ---------------------------------------------------------------------------
  score_calibration:
    script: scripts/automation/score_calibration.py
    schedule: "0 11 * * 0"  # Sunday 11am — weekly calibration
    enabled: true
    timeout: 600
    description: "Analyze score distribution, flag calibration drift, rescore top 500 tools"
