services:
  - type: web
    name: clarvia-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CORS_ORIGINS
        value: "https://clarvia.art,https://www.clarvia.art"
    healthCheckPath: /health
    autoDeploy: true
