name: 'Clarvia AEO Scan'
description: 'Check your API AEO readiness score with the Clarvia Scanner'
author: 'Clarvia'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  url:
    description: 'URL to scan for AEO readiness'
    required: true
  fail-under:
    description: 'Minimum score threshold (exit 1 if score is below)'
    required: false
    default: '0'
  api-url:
    description: 'Clarvia API base URL'
    required: false
    default: 'https://clarvia.art'
  format:
    description: 'Output format: text, json, or sarif'
    required: false
    default: 'text'

outputs:
  score:
    description: 'The Clarvia AEO score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  rating:
    description: 'The rating (excellent, strong, moderate, weak)'
    value: ${{ steps.scan.outputs.rating }}
  scan-id:
    description: 'The scan ID for referencing results'
    value: ${{ steps.scan.outputs.scan_id }}
  badge-url:
    description: 'URL to the AEO badge SVG'
    value: ${{ steps.scan.outputs.badge_url }}

runs:
  using: 'composite'
  steps:
    - name: Run Clarvia AEO Scan
      id: scan
      run: bash "${{ github.action_path }}/scan.sh"
      shell: bash
      env:
        SCAN_URL: ${{ inputs.url }}
        FAIL_UNDER: ${{ inputs.fail-under }}
        API_URL: ${{ inputs.api-url }}
        OUTPUT_FORMAT: ${{ inputs.format }}
